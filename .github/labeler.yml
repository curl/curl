      - changed-files:
          - any-glob-to-all-files: "{\
              CMake/FindGSS.cmake,\
              CMake/FindLibgsasl.cmake,\
              docs/libcurl/opts/CURLINFO_HTTPAUTH*,\
              docs/libcurl/opts/CURLINFO_PROXYAUTH*,\
              docs/libcurl/opts/CURLOPT_KRB*,\
              docs/libcurl/opts/CURLOPT_SASL*,\
