              docs/libcurl/opts/CURLOPT_USERNAME*,\
              docs/libcurl/opts/CURLOPT_USERPWD*,\
              docs/libcurl/opts/CURLOPT_XOAUTH*,\
              lib/*gssapi*,\
              lib/*ntlm*,\
              lib/curl_sasl.*,\
              lib/http_aws*,\
              lib/http_digest.*,\
              lib/http_negotiate.*,\
              lib/vauth/**\
              }"

build:
